---
version: "3.9"
services:
  devopsdb:
    image: rajagadi/automation:db
    ports:
      - "3306:3306"
    networks:
      - mynetworks
    deploy:
      replicas: 3
    volumes:
      - db_data:/var/lib/mysql

  application:
    image: rajagadi/automation:app
    ports:
      - "1111:8080"
    depends_on:
      - devopsdb
    networks:
      - mynetworks
    

networks:              # ✅ top level — same indentation as services
  mynetworks:          # ✅ mapping not a list
    driver: overlay

volumes:
  db_data:             # named volume — Docker manages the storage
    driver: local
